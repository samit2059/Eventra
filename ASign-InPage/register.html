<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eventra - Create Account</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="icon" type="image/x-icon" href="../images/Logo1.png" />
  
  <link rel="stylesheet" href="../mainEvent/event.css" />
  <style>
    body {
      background: var(--background);
    }
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 20px 40px;
    }
    .auth-card {
      background: var(--surface);
      border-radius: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 1000px;
      display: flex;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .auth-banner {
      flex: 1;
      background: linear-gradient(rgba(11, 17, 38, 0.8), rgba(11, 17, 38, 0.4)), url('../images/Main_carnival.jpg') center/cover no-repeat;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px;
      color: white;
    }
    .auth-banner h2 {
      color: white;
      font-size: 40px;
      font-weight: 800;
      margin-bottom: 20px;
    }
    .auth-banner p {
      font-size: 16px;
      opacity: 0.9;
    }
    .auth-form-wrapper {
      flex: 1;
      padding: 60px;
      background: var(--surface);
    }
    .auth-form-wrapper h3 {
      font-size: 28px;
      color: var(--secondary);
      margin-bottom: 10px;
    }
    
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      font-size: 14px;
      color: var(--secondary);
    }
    .form-control {
      width: 100%;
      padding: 15px 45px 15px 20px;
      background: var(--background);
      border: 1px solid var(--border);
      border-radius: 12px;
      font-size: 15px;
      transition: all 0.3s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(237, 61, 12, 0.1);
    }

    .gender-group {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }
    .radio-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 15px;
      color: var(--secondary);
    }
    
    .submit-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      margin-bottom: 15px;
    }
    .submit-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
    }

    @media (max-width: 900px) {
      .auth-card { flex-direction: column; }
      .auth-banner, .auth-form-wrapper { padding: 40px 30px; }
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="nav-container">
      <a class="nav-brand" href="../mainEvent/event.html">
        <img src="../images/Logo1.png" alt="Eventra Logo"> Eventra
      </a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-banner">
        <h2>Join Eventra</h2>
        <p>Join the biggest event platform in Nepal. Discover and host unforgettable experiences today.</p>
      </div>
      
      <div class="auth-form-wrapper">
        <h3>Create Account</h3>
        <p style="color: var(--text-muted); margin-bottom: 30px;">Fill in your details to get started.</p>
        
        <form id="register-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" class="form-control" placeholder="Choose a unique name" required minlength="3" />
          </div>
          
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" class="form-control" placeholder="example@eventra.com" required />
          </div>
          
          <div class="form-group">
            <label for="pwd">Password</label>
            <input type="password" id="pwd" class="form-control" placeholder="Min. 6 characters" required minlength="6" />
          </div>
          
          <div class="gender-group">
            <label class="radio-label"><input type="radio" name="gender" value="Male" checked> Male</label>
            <label class="radio-label"><input type="radio" name="gender" value="Female"> Female</label>
          </div>
          
          <button type="submit" class="submit-btn">Register Now</button>
          
          <div style="text-align: center; margin-top: 15px;">
            <a href="index.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">Already have an account? Login</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script>
    // ── Helpers ─────────────────────────────────────────────────────────
    function safeJSONParse(key, defaultValue = {}) {
        try {
            const item = localStorage.getItem(key);
            if (!item) return defaultValue;
            const parsed = JSON.parse(item);
            if (defaultValue !== null && typeof defaultValue === 'object' && !Array.isArray(defaultValue)) {
                if (Array.isArray(parsed) || typeof parsed !== 'object') return defaultValue;
            }
            return parsed;
        } catch (e) { return defaultValue; }
    }

    const form = document.getElementById('register-form');
    const username = document.getElementById('username');
    const email = document.getElementById('email');
    const password = document.getElementById('pwd');

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        
        let users = safeJSONParse('users', {});
        if(users[username.value]) {
            alert('Username already exists! Please login instead.');
            return;
        }

        // Save User
        users[username.value] = {
            password: password.value,
            email: email.value,
            tickets: [],
            hosted: []
        };
        localStorage.setItem('users', JSON.stringify(users));
        localStorage.setItem('activeUser', JSON.stringify({username: username.value}));
        
        alert('Registration Successful! Sending you to your dashboard...');
        window.location.href = "../mainEvent/profile.html";
    });

    // If already logged in, skip this page
    const activeUser = safeJSONParse('activeUser', null);
    if(activeUser && activeUser.username) {
        window.location.href = "../mainEvent/profile.html";
    }
  </script>
</body>
</html>
