<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Details</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
     font-family: Arial, sans-serif; margin: 0; padding: 0;
      }

    .banner {
     background: url('https://images.stockcake.com/public/f/9/1/f91a954f-472b-4dc0-9221-20f73966dcd5_large/community-meeting-discussion-stockcake.jpg') center/cover no-repeat; height: 250px; }
    .container { padding: 2rem; }
    .event-info { margin-top: 1.5rem;
     }
    .event-info h1 {
     font-size: 2rem; margin-bottom: 0.5rem;
     }
    .event-meta { 
    color: #555; margin-bottom: 1rem;
     }
    .btn-group { 
    display: flex; gap: 1rem; margin-top: 1.5rem; 
    }
    .btn { 
    padding: 0.5rem 1rem; background: #007bff; color: #fff; border: none; border-radius: 5px; cursor: pointer; text-decoration: none;
     }
  </style>
</head>
<body>
  <div class="banner"></div>
  <div class="container">
    <div class="event-info">
      <h1>Community Tech Meetup</h1>
      <p class="event-meta">📅 July 25, 2025 | 🕒 5:00 PM - 8:00 PM | 📍 Innovation Hub, NY</p>
      <p>Join fellow tech enthusiasts for an evening of networking, lightning talks, and community collaboration. Snacks and drinks provided!</p>
      <div class="btn-group">
        <a href="#" class="btn">Register</a>
        <a href="#" class="btn">Share</a>
      </div>
    </div>
  </div>
</body>
</html>
