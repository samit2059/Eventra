<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Failed</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background-color: #ffeaea;
      margin-top: 100px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .fail-container {
      max-width: 500px;
      margin: auto;
      background-color: #fff;
      padding: 40px;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }
    .fail-container h2 {
      color: #dc3545;
    }
    .fail-container p {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="fail-container">
    <h2>❌ Payment Failed</h2>
    <p>Sorry, something went wrong with your transaction. Please try again.</p>
    <a href="http://127.0.0.1:5500/Payment/payment.html" class="btn btn-danger mt-3">Try Again</a>
  </div>
</body>
</html>
