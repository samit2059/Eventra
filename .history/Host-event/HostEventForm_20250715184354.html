<form id="hostEventForm">
    <h2>Host an Event</h2>
    <label for="title">Event Title</label>
    <input type="text" id="title" name="title" required />

    <label for="date">Date</label>
    <input type="date" id="date" name="date" required />

    <label for="location">Location</label>
    <input type="text" id="location" name="location" required />

    <label for="category">Category</label>
    <select id="category" name="category" required>
      <option value="">Select a category</option>
      <option value="Tech">Rock song</option>
      <option value="Music">Local song</option>
      <option value="Health">Lok dohori</option>
      <option value="Education">Rap song</option>
    </select>

    <label for="description">Description</label>
    <textarea id="description" name="description" rows="4" required></textarea>

    <label for="image">Upload Image</label>
    <input type="file" id="image" name="image" accept="image/*" required />

    <button type="submit"><a href="Host_dashboard.html" style="text-decoration: none; color: #fff;">Submit</a></button>
    <div id="formErrors" class="error"></div>
  </form>

<br>

  <script>
    const form = document.getElementById('hostEventForm');
    const errors = document.getElementById('formErrors');

    form.addEventListener('submit', function(event) {
      errors.textContent = '';
      const requiredFields = ['title', 'date', 'location', 'category', 'description', 'image'];
      let hasError = false;
      requiredFields.forEach(id => {
        const el = document.getElementById(id);
        if (!el.value || (el.type === 'file' && el.files.length === 0)) {
          hasError = true;
        }
      });
      if (hasError) {
        event.preventDefault();
        errors.textContent = 'Please fill out all fields before submitting.';
      }
    });
  </script>
